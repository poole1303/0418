<!DOCTYPE html>
<html>
<head>
    <title>Web AR Example</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body>
    <a-scene embedded arjs="sourceType: webcam;">
        
        <a-marker preset="hiro">

            <!-- 原本的方塊 -->
            <a-box 
                position="0 0.5 0" 
                rotation="0 45 0" 
                color="#552583">
            </a-box>

            <!-- 球體 -->
            <a-sphere 
                position="1 0.5 0" 
                radius="0.4" 
                color="#FFC65D">
            </a-sphere>

            <!-- 圓柱 -->
            <a-cylinder 
                position="-1 0.5 0" 
                radius="0.3" 
                height="1" 
                color="#7BC8A4">
            </a-cylinder>

            <!-- 圓錐 -->
            <a-cone 
                position="0 0.5 1" 
                radius-bottom="0.4" 
                height="1" 
                color="#FF6B6B">
            </a-cone>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>
</body>
</html>
